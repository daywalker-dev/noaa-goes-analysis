# ===========================================================================
# GOES L2 Probabilistic Forecasting — Master Configuration
# ===========================================================================
# This is the canonical config file. Use with:
#   python main.py stream --config config/default.yaml
#   python main.py train  --config config/default.yaml --stage encoders

project:
  name: goes_forecast
  seed: 42
  device: "cuda"
  output_dir: outputs
  checkpoint_dir: checkpoints
  experiment_id: null

# ---------------------------------------------------------------------------
# DATA
# ---------------------------------------------------------------------------
data:
  satellite: "goes16"
  raw_dir: data/raw
  processed_dir: data/processed
  zarr_path: data/processed/goes_l2.zarr
  stats_path: data/processed/stats.json

  products:
    - {id: ABI-L2-SSTF,  domain: sea,   channels: [SST],            required: true}
    - {id: ABI-L2-LSTF,  domain: land,  channels: [LST],            required: true}
    - {id: ABI-L2-CMIPF, domain: cloud, channels: [CMI_C07,CMI_C08,CMI_C09,CMI_C10,CMI_C11,CMI_C12,CMI_C13,CMI_C14,CMI_C15,CMI_C16], required: true}
    - {id: ABI-L2-DMWF,  domain: meteo, channels: [wind_speed,wind_direction,pressure], required: true}
    - {id: ABI-L2-TPWF,  domain: meteo, channels: [TPW],            required: true}
    - {id: ABI-L2-AODF,  domain: meteo, channels: [AOD],            required: false}

  date_range:
    start: "2023-06-01"
    end: "2023-08-31"

  # ── Streaming pipeline (download+preprocess, disk-efficient) ──────────
  streaming:
    interval_hours: 3          # Download every 3h instead of 1h (3× fewer files)
    disk_budget_gb: 10         # Hard limit on total disk usage
    goes2go_cache: null        # null = ~/data (goes2go default); set to override
    cleanup_raw: true          # Delete raw NetCDF immediately after preprocessing

  # ── Preprocessing ────────────────────────────────────────────────────
  preprocessing:
    target_resolution_deg: 0.04
    lat_range: [15.0, 55.0]
    lon_range: [-135.0, -60.0]
    quality_threshold: 0.5
    gap_fill_minutes: 30
    fill_strategy: interpolate
    compression: blosc_lz4

  # ── Temporal ─────────────────────────────────────────────────────────
  temporal:
    input_steps: 12
    forecast_steps: 24
    stride: 1

  # ── Spatial ──────────────────────────────────────────────────────────
  spatial:
    target_resolution_km: 10.0
    grid_size: [256, 256]
    patch_size: 256
    patch_stride: 128

  # ── Train/val/test splits ────────────────────────────────────────────
  splits:
    train: ["2023-06-01", "2023-07-31"]
    val:   ["2023-08-01", "2023-08-15"]
    test:  ["2023-08-16", "2023-08-31"]

  # ── DataLoader ───────────────────────────────────────────────────────
  loader:
    batch_size: 4
    num_workers: 4
    pin_memory: true
    prefetch_factor: 2

  # ── Augmentation ─────────────────────────────────────────────────────
  augmentation:
    horizontal_flip: true
    vertical_flip: true

  # ── Normalization ────────────────────────────────────────────────────
  normalization:
    method: "minmax"           # minmax | zscore | robust

  # ── Missing data ─────────────────────────────────────────────────────
  missing_data:
    fill_strategy: "mask"      # mask | interpolate | zero

  # ── Storage format ───────────────────────────────────────────────────
  storage:
    format: "zarr"
    root: "data/zarr/"

# ---------------------------------------------------------------------------
# MODEL — Spatial CNN Encoders
# ---------------------------------------------------------------------------
model:
  encoder:
    latent_dim: 128
    n_res_blocks: 4
    base_channels: 64
    channel_multipliers: [1, 2, 4, 8]
    use_cbam: true
    dropout: 0.1

  # ── Temporal Probabilistic Model ─────────────────────────────────────
  temporal:
    d_model: 256
    n_heads: 8
    n_encoder_layers: 4
    n_decoder_layers: 4
    dim_feedforward: 1024
    dropout: 0.1
    meteo_dim: 64
    state_dim: 256
    beta_kl: 1.0
    free_bits: 0.5
    kl_anneal_epochs: 20

  # ── Reverse Generator (Conditional Decoder) ──────────────────────────
  generator:
    base_channels: 64
    channel_multipliers: [8, 4, 2, 1]
    n_res_blocks: 2
    noise_dim: 32
    use_spectral_norm: true
    initial_spatial: [8, 8]

  # ── Fusion Model ─────────────────────────────────────────────────────
  fusion:
    d_model: 256
    n_heads: 8
    n_layers: 3
    dim_feedforward: 512
    dropout: 0.1
    n_sources: 4

# ---------------------------------------------------------------------------
# TRAINING
# ---------------------------------------------------------------------------
training:
  mixed_precision: true
  gradient_clip: 1.0
  compile_model: false

  stages:
    encoders:
      epochs: 50
      optimizer: {type: AdamW, lr: 1.0e-4, weight_decay: 1.0e-5}
      scheduler: {type: CosineAnnealingLR, T_max: 50, eta_min: 1.0e-6}
      loss_weights: {mse: 1.0, ssim: 0.5, physics: 0.1}

    temporal:
      epochs: 80
      optimizer: {type: AdamW, lr: 5.0e-5, weight_decay: 1.0e-5}
      scheduler: {type: CosineAnnealingWarmRestarts, T_0: 20, T_mult: 2, eta_min: 1.0e-6}
      loss_weights: {elbo: 1.0, crps: 0.5}

    generator:
      epochs: 50
      optimizer: {type: AdamW, lr: 1.0e-4, weight_decay: 1.0e-5}
      scheduler: {type: CosineAnnealingLR, T_max: 50, eta_min: 1.0e-6}
      loss_weights: {mse: 1.0, ssim: 0.5, spectral: 0.2}

    fusion:
      epochs: 30
      unfreeze_all: false
      optimizer: {type: AdamW, lr: 3.0e-5, weight_decay: 1.0e-5}
      scheduler: {type: CosineAnnealingLR, T_max: 30, eta_min: 1.0e-7}
      loss_weights: {mse: 1.0, ssim: 0.5, crps: 0.5, physics: 0.1}

  checkpointing:
    save_top_k: 3
    monitor: val/loss
    mode: min

  early_stopping:
    patience: 15
    min_delta: 1.0e-4

  logging:
    log_every_n_steps: 50
    use_wandb: false
    use_tensorboard: true

# ---------------------------------------------------------------------------
# EVALUATION
# ---------------------------------------------------------------------------
evaluation:
  lead_times: [1, 3, 6, 12, 24]
  n_mc_samples: 50
  confidence_levels: [0.5, 0.8, 0.9, 0.95]
  metrics: [rmse, mae, bias, ssim, spatial_correlation, crps_gaussian, coverage]
  calibration:
    num_bins: 20
  multi_step:
    horizons: [1, 2, 4]
  save_plots: true
  plot_dir: "eval_plots/"